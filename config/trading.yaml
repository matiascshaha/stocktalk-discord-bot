# StockTalk Trading Configuration
# Edit this file to configure behavior without touching code.
# Secrets (Discord token, API keys) should stay in .env.
# This replaces the old trading.yaml with clearer intent.

version: 1

# =============================================================================
# DISCORD CONFIGURATION
# =============================================================================
discord:
  # Target channel to monitor for analyst signals
  channel_id: 1014979505359683726

# =============================================================================
# AI/PARSING CONFIGURATION
# =============================================================================
ai:
  # Provider options: openai | anthropic | google | none
  # If unset, the app will pick the first available key in .env
  provider: auto

  # If true, falls back to any available provider if the preferred one fails
  fallback_to_available_provider: true

  prompt:
    # Path to the prompt template file
    file: ./config/ai_parser.prompt

  openai:
    # Fast parser model (stage 1)
    model: gpt-4.1-nano
    # Fallback parser model (stage 2, used when fast stage is ambiguous/low-confidence)
    fallback_model: gpt-4.1-mini
    # Output budget for fallback stage
    max_tokens: 1800
    fallback_max_tokens: 1800
    fallback_temperature: 0.0
    fast_prompt_file: ./config/ai_parser_fast.prompt
    # Fast stage is the default OpenAI path.
    fast_confidence_threshold: 0.85
    fast_max_tokens: 140
    temperature: 0.0

# =============================================================================
# TRADING EXECUTION CONFIGURATION
# =============================================================================
trading:
  # Enable automatic trade execution via the selected broker adapter
  auto_trade: true

  # Canonical provider selection:
  # execution_provider controls where orders are sent.
  # quote_provider controls where executable reference prices come from.
  # quote_provider=auto means "same as execution_provider".
  execution_provider: webull
  quote_provider: yahoo

  # Master gate for option execution.
  # false = option signals are parsed/logged but never submitted to broker.
  # When false, fixed_notional.options.* and option sizing settings are no-op for runtime execution.
  options_enabled: true
  
  # CRITICAL: Toggle between paper trading (UAT/test) and live trading (production)
  # true = Paper trading (us-openapi-alb.uat.webullbroker.com) - SAFE FOR TESTING
  # false = Live trading (api.webull.com) - REAL MONEY - USE WITH CAUTION
  paper_trade: true
  
  # Minimum confidence threshold for AI-parsed picks (0.0-1.0)
  # Picks below this confidence will be logged but not executed
  min_confidence: 0.7
  
  # Default stock notional baseline.
  # Also used as fallback source for options_default_amount when fixed_notional.options.amount is not set.
  default_amount: 1000

  # Fixed-notional sizing policies.
  # stocks.enabled=true: BUY stock orders force stocks.amount notional.
  # options.enabled=true: BUY option orders target options.amount notional (via preview-derived contract cost).
  fixed_notional:
    stocks:
      enabled: false
      amount: 1000
    options:
      enabled: true
      amount: 1000

  # Weighting-based sizing controls.
  # stocks.enabled=true: stock orders may use parsed weight_percent when fixed_notional.stocks.enabled=false.
  # options.enabled=true: option orders may use parsed weight_percent when fixed_notional.options.enabled=false.
  # These toggles are independent; you can run stock weighting ON with option weighting OFF (or vice versa).
  weighting:
    stocks:
      enabled: true
    options:
      enabled: true

  # Applies to both stock and option weighting-based sizing.
  # false = fail fast on weighting sizing errors (no retry using default notional amount).
  fallback_to_default_amount_on_weighting_failure: false
  
  # Use market orders (vs limit orders)
  use_market_orders: true
  
  # Allow extended hours trading (pre-market, after-market)
  extended_hours_trading: false
  
  # Time in force: DAY, GTC, IOC, FOK
  time_in_force: DAY

  # During off-hours, submit queued limit order instead of market order.
  queue_when_closed: true

  # TIF for queued off-hours limit orders.
  queue_time_in_force: GTC

  # Price buffer in basis points for off-hours limit orders.
  out_of_hours_limit_buffer_bps: 50

  # Optional explicit BUY fallback limit price when quotes are unavailable.
  # Keep unset/null to fail safe instead of submitting a blind order.
  # buy_limit_price_without_quote: null

  # Hard execution guard: reject trades that would drop below this projected margin equity %.
  # Set to 0 to disable this runtime guard.
  min_margin_equity_pct: 35

# =============================================================================
# ACCOUNT CONSTRAINTS (Natural Language)
# =============================================================================
# These constraints are passed to the AI parser to enforce position sizing,
# margin management, and portfolio rules automatically.
# Use natural language to describe your account rules.
account_constraints: |
  MARGIN CONSTRAINTS:
  - Never let Margin Equity % fall below 35% after a trade.
  - Do not place the trade if the resulting Margin Equity % would be < 35%.

  TRADING RULES:
  - Only execute LONG positions or PUT positions.
  - Allowed instruments: common stock, CALL options, PUT options.
  - No short selling.

# =============================================================================
# CHANNEL-TO-ANALYST MAPPING
# =============================================================================
# Map Discord channel IDs to analyst profiles.
# Each analyst has custom sizing multipliers, options preferences, and margin rules.
# Enables per-analyst configuration without code changes.
analyst_channels:
  # Format: channel_id: {name, commons_multiplier, options_multiplier, margin_buffer_required}
  # Example:
  "1229546005788098580": 
    name: "Stock Talk"
    analyst_preferences: |
      When an analyst posts an options alert for a ticker:

      You will be provided the full options chain in the prompt.

      1) Determine analyst weighting:
          - Bucket A: >= 5%
          - Bucket B: < 5%

      2) Buy the analyst’s exact recommended option:
          - Bucket A: $2,000
          - Bucket B: $1,000

      3) Buy common shares:
          - Bucket A: $4,000
          - Bucket B: $3,000

      4) Add a short-term lotto option (<30 DTE, nearest ATM from the chain) ONLY if
          its mid price is <= 5% above the analyst’s stated average:
          - Bucket A: $1,000
          - Bucket B: $500

      The lotto is for quick momentum and quick exit.
  "1014979505359683726": 
    name: "Stock Talk"
    analyst_preferences: |
      When an analyst posts an options alert for a ticker:

      You will be provided the full options chain in the prompt.

      1) Determine analyst weighting:
          - Bucket A: >= 5%
          - Bucket B: < 5%

      2) Buy the analyst’s exact recommended option:
          - Bucket A: $2,000
          - Bucket B: $1,000

      3) Buy common shares:
          - Bucket A: $4,000
          - Bucket B: $3,000

      4) Add a short-term lotto option (<30 DTE, nearest ATM from the chain) ONLY if
          its mid price is <= 5% above the analyst’s stated average:
          - Bucket A: $1,000
          - Bucket B: $500

      The lotto is for quick momentum and quick exit.


